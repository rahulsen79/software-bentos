<!DOCTYPE html>
<html lang="en" data-color-mode="dark">
<head>
  <meta charset="UTF-8">
  <title>OTA Bento – Slide View (1920×1080)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Volvo Design System Tokens (Centenary dark mode) */
      --v-color-foreground-primary: #ffffff;
      --v-color-foreground-secondary: #969696;
      --v-color-foreground-tertiary: #787878;
      --v-color-background-primary: #000000;
      --v-color-background-secondary: #171717;
      --v-color-ornament-primary: rgb(100% 100% 100% / 0.16);
      --v-color-surface-accent-blue: #3354ff;
      --v-color-surface-accent-safety: #fc6408;
      --v-color-surface-feedback-green: #048220;
      --v-color-surface-feedback-red: #e52715;
      --v-color-state-primary-subtle: rgb(100% 100% 100% / 0.08);

      /* Spacing */
      --v-space-2: 0.125rem;
      --v-space-4: 0.25rem;
      --v-space-8: 0.5rem;
      --v-space-12: 0.75rem;
      --v-space-16: 1rem;
      --v-space-24: 1.5rem;
      --v-space-32: 2rem;
      --v-space-48: 3rem;

      /* Shape */
      --v-shape-default: 0px;
      --v-shape-emphasis: 9999px;

      /* Font */
      --v-font-sans: "Volvo Centum", "Helvetica Neue", "Helvetica", "Noto Sans", "Segoe UI", "Arial", sans-serif;
      --v-font-broad: "Volvo Broad Pro", "Volvo Broad", "Arial Black", sans-serif;
    }

    body {
      background: var(--v-color-background-primary);
      font-family: var(--v-font-sans);
      color: var(--v-color-foreground-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .bento {
      width: 1920px;
      height: 1080px;
      background: var(--v-color-background-primary);
      display: grid;
      grid-template-columns: 1fr 1fr 280px;
      grid-template-rows: 1fr auto;
      gap: 0;
      padding: var(--v-space-48);
      position: relative;
      overflow: hidden;
    }

    .zone-heroes {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: var(--v-space-2);
      padding-right: var(--v-space-2);
    }

    .zone-medium {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: var(--v-space-2);
      padding-right: var(--v-space-2);
    }

    .zone-small {
      display: flex;
      flex-direction: column;
      gap: var(--v-space-2);
    }

    .tile {
      border-radius: var(--v-shape-default);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: var(--v-space-32);
    }

    .tile--hero {
      background-size: cover;
      background-position: center;
    }

    .tile--hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0.05) 100%);
      z-index: 1;
    }

    .tile--hero .tile__content { position: relative; z-index: 2; }

    .hero-1 { grid-column: 1 / 3; grid-row: 1 / 2; background: linear-gradient(160deg, #0a0f2e 0%, #131d5c 100%); }
    .hero-2 { grid-column: 1 / 2; grid-row: 2 / 3; background: linear-gradient(160deg, #0a1f0a 0%, #153015 100%); }
    .hero-3 { grid-column: 2 / 3; grid-row: 2 / 3; background: linear-gradient(160deg, #2a0a0a 0%, #401515 100%); }

    .tile--medium {
      background: var(--v-color-background-secondary);
      border: 1px solid var(--v-color-ornament-primary);
    }

    .tile--medium .tile__icon { font-size: 32px; margin-bottom: var(--v-space-12); }

    .tile--small {
      background: var(--v-color-background-secondary);
      border: 1px solid var(--v-color-ornament-primary);
      border-radius: var(--v-shape-default);
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      padding: var(--v-space-12) var(--v-space-16);
      gap: var(--v-space-12);
      flex: 1;
    }

    .tile--small .tile__icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }

    /* Typography — editorial scale with Volvo DNA */
    .tile__headline {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: var(--v-space-8);
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    .tile--hero .tile__headline {
      font-size: 36px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: var(--v-space-8);
    }

    .hero-1 .tile__headline { font-size: 48px; }

    .tile--small .tile__headline {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
    }

    .tile__subheadline {
      font-size: 15px;
      font-weight: 400;
      color: var(--v-color-foreground-secondary);
      line-height: 1.5;
      margin-bottom: var(--v-space-16);
      text-wrap: pretty;
    }

    .tile--medium .tile__subheadline {
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: var(--v-space-16);
    }

    /* Tags — pill shape per Volvo emphasis */
    .tile__tags { display: flex; gap: var(--v-space-8); align-items: center; flex-wrap: wrap; }

    .tag {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: var(--v-shape-emphasis);
      background: var(--v-color-state-primary-subtle);
      color: var(--v-color-foreground-secondary);
    }

    .tag--safety { background: var(--v-color-surface-accent-safety); color: #000; }
    .tag--platform { background: var(--v-color-surface-accent-blue); color: #fff; }
    .tag--sustainability { background: var(--v-color-surface-feedback-green); color: #fff; }
    .tag--convenience { background: var(--v-color-surface-accent-blue); color: #fff; opacity: 0.8; }
    .tag--ux { background: var(--v-color-foreground-tertiary); color: #000; }
    .tag--new { background: var(--v-color-foreground-primary); color: #000; }
    .tag--spa { background: transparent; border: 1px solid var(--v-color-ornament-primary); color: var(--v-color-foreground-tertiary); }

    .tile--accent-safety { border-left: 2px solid var(--v-color-surface-accent-safety); }
    .tile--accent-convenience { border-left: 2px solid var(--v-color-surface-accent-blue); }
    .tile--accent-other { border-left: 2px solid var(--v-color-foreground-tertiary); }

    .footer {
      grid-column: 1 / 4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: var(--v-space-24);
    }

    .footer__logo {
      font-family: var(--v-font-broad);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--v-color-foreground-tertiary);
    }

    .footer__title {
      font-size: 12px;
      color: var(--v-color-foreground-tertiary);
    }
  </style>
</head>
<body>
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<a href="index.html" style="position:fixed;top:24px;left:28px;z-index:100;color:var(--v-color-foreground-secondary);text-decoration:none;font-family:var(--v-font-sans);font-size:13px;display:flex;align-items:center;gap:6px;letter-spacing:0.02em;"><span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span>Back</a>
<div class="bento" id="bento"></div>

<script>
fetch('bento-data.json').then(r => r.json()).then(data => {
  const heroes = data.features.filter(f => f.tier === 'hero');
  const mediums = data.features.filter(f => f.tier === 'medium');
  const smalls = data.features.filter(f => f.tier === 'small');

  const heroClasses = ['hero-1', 'hero-2', 'hero-3'];

  let html = '<div class="zone-heroes">';
  heroes.forEach((f, i) => {
    html += `
      <div class="tile tile--hero ${heroClasses[i]}">
        <div class="tile__content">
          <h2 class="tile__headline">${f.headline}</h2>
          <p class="tile__subheadline">${f.subheadline}</p>
          <div class="tile__tags">
            <span class="tag tag--${f.tagColor}">${f.tag}</span>
            <span class="tag tag--spa">${f.platform}</span>
          </div>
        </div>
      </div>`;
  });
  html += '</div>';

  html += '<div class="zone-medium">';
  mediums.forEach(f => {
    html += `
      <div class="tile tile--medium">
        <div class="tile__content">
          <div class="tile__icon">${f.icon}</div>
          <h2 class="tile__headline">${f.headline}</h2>
          <p class="tile__subheadline">${f.subheadline}</p>
          <div class="tile__tags">
            <span class="tag tag--${f.tagColor}">${f.tag}</span>
            <span class="tag tag--spa">${f.platform}</span>
          </div>
        </div>
      </div>`;
  });
  html += '</div>';

  html += '<div class="zone-small">';
  smalls.forEach(f => {
    html += `
      <div class="tile tile--small tile--accent-${f.accent}">
        <span class="tile__icon">${f.icon}</span>
        <span class="tile__headline">${f.headline}</span>
      </div>`;
  });
  html += '</div>';

  html += `
    <div class="footer">
      <span class="footer__logo">V O L V O</span>
      <span class="footer__title">${data.release.title} — ${data.release.subtitle}</span>
    </div>`;

  document.getElementById('bento').innerHTML = html;
});
</script>
</body>
</html>
