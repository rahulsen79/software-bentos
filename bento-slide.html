<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OTA Bento – Slide View (1920×1080)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .bento {
      width: 1920px;
      height: 1080px;
      background: #111;
      display: grid;
      grid-template-columns: 1fr 1fr 280px;
      grid-template-rows: 1fr auto;
      gap: 0;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .zone-heroes {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 14px;
      padding-right: 14px;
    }

    .zone-medium {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 14px;
      padding-right: 14px;
    }

    .zone-small {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tile {
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 28px;
    }

    .tile--hero {
      background-size: cover;
      background-position: center;
    }

    .tile--hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.25) 60%, rgba(0,0,0,0.05) 100%);
      z-index: 1;
    }

    .tile--hero .tile__content { position: relative; z-index: 2; }

    .hero-1 { grid-column: 1 / 3; grid-row: 1 / 2; background: linear-gradient(135deg, #1a237e, #0d47a1); }
    .hero-2 { grid-column: 1 / 2; grid-row: 2 / 3; background: linear-gradient(135deg, #1b5e20, #2e7d32); }
    .hero-3 { grid-column: 2 / 3; grid-row: 2 / 3; background: linear-gradient(135deg, #b71c1c, #d32f2f); }

    .tile--medium {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .tile--medium .tile__icon { font-size: 36px; margin-bottom: 12px; }

    .tile--small {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      padding: 14px 16px;
      gap: 12px;
      flex: 1;
    }

    .tile--small .tile__icon { font-size: 18px; flex-shrink: 0; width: 28px; text-align: center; }

    /* Typography */
    .tile__headline { font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; letter-spacing: -0.02em; }
    .tile--hero .tile__headline { font-size: 32px; margin-bottom: 6px; }
    .hero-1 .tile__headline { font-size: 40px; }
    .tile--small .tile__headline { font-size: 12px; font-weight: 600; line-height: 1.3; }
    .tile__subheadline { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.7); line-height: 1.4; margin-bottom: 12px; }
    .tile--medium .tile__subheadline { font-size: 12px; margin-bottom: 10px; }

    /* Tags */
    .tile__tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .tag { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 4px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
    .tag--safety { background: #e53935; color: #fff; }
    .tag--platform { background: #7c4dff; color: #fff; }
    .tag--sustainability { background: #43a047; color: #fff; }
    .tag--convenience { background: #1e88e5; color: #fff; }
    .tag--ux { background: #ff8f00; color: #fff; }
    .tag--new { background: #00bcd4; color: #fff; }
    .tag--spa { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }

    .tile--accent-safety { border-left: 3px solid #e53935; }
    .tile--accent-convenience { border-left: 3px solid #1e88e5; }
    .tile--accent-other { border-left: 3px solid #555; }

    .footer {
      grid-column: 1 / 4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 20px;
    }

    .footer__logo { font-size: 13px; font-weight: 700; letter-spacing: 0.35em; text-transform: uppercase; opacity: 0.5; }
    .footer__title { font-size: 13px; opacity: 0.4; }
  </style>
</head>
<body>
<a href="index.html" style="position:fixed;top:20px;left:24px;z-index:100;color:rgba(255,255,255,0.6);text-decoration:none;font-family:Georgia,serif;font-size:14px;display:flex;align-items:center;gap:6px;">← <span>back</span></a>
<div class="bento" id="bento"></div>

<script>
fetch('bento-data.json').then(r => r.json()).then(data => {
  const heroes = data.features.filter(f => f.tier === 'hero');
  const mediums = data.features.filter(f => f.tier === 'medium');
  const smalls = data.features.filter(f => f.tier === 'small');

  const heroClasses = ['hero-1', 'hero-2', 'hero-3'];

  let html = '<div class="zone-heroes">';
  heroes.forEach((f, i) => {
    html += `
      <div class="tile tile--hero ${heroClasses[i]}">
        <div class="tile__content">
          <h2 class="tile__headline">${f.headline}</h2>
          <p class="tile__subheadline">${f.subheadline}</p>
          <div class="tile__tags">
            <span class="tag tag--${f.tagColor}">${f.tag}</span>
            <span class="tag tag--spa">${f.platform}</span>
          </div>
        </div>
      </div>`;
  });
  html += '</div>';

  html += '<div class="zone-medium">';
  mediums.forEach(f => {
    html += `
      <div class="tile tile--medium">
        <div class="tile__content">
          <div class="tile__icon">${f.icon}</div>
          <h2 class="tile__headline">${f.headline}</h2>
          <p class="tile__subheadline">${f.subheadline}</p>
          <div class="tile__tags">
            <span class="tag tag--${f.tagColor}">${f.tag}</span>
            <span class="tag tag--spa">${f.platform}</span>
          </div>
        </div>
      </div>`;
  });
  html += '</div>';

  html += '<div class="zone-small">';
  smalls.forEach(f => {
    html += `
      <div class="tile tile--small tile--accent-${f.accent}">
        <span class="tile__icon">${f.icon}</span>
        <span class="tile__headline">${f.headline}</span>
      </div>`;
  });
  html += '</div>';

  html += `
    <div class="footer">
      <span class="footer__logo">V O L V O</span>
      <span class="footer__title">${data.release.title} — ${data.release.subtitle}</span>
    </div>`;

  document.getElementById('bento').innerHTML = html;
});
</script>
</body>
</html>
