<!DOCTYPE html>
<html lang="en" data-color-mode="dark">
<head>
  <meta charset="UTF-8">
  <title>Software Bentos – Volvo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --v-color-foreground-primary: #ffffff;
      --v-color-foreground-secondary: #969696;
      --v-color-foreground-tertiary: #787878;
      --v-color-background-primary: #000000;
      --v-color-background-secondary: #171717;
      --v-color-ornament-primary: rgb(100% 100% 100% / 0.16);
      --v-color-state-primary-subtle: rgb(100% 100% 100% / 0.08);
      --v-font-sans: "Volvo Centum", "Helvetica Neue", "Helvetica", "Noto Sans", "Segoe UI", "Arial", sans-serif;
      --v-font-broad: "Volvo Broad Pro", "Volvo Broad", "Arial Black", sans-serif;
      --v-shape-default: 0px;
      --v-space-8: 0.5rem;
      --v-space-16: 1rem;
      --v-space-24: 1.5rem;
      --v-space-48: 3rem;
      --v-space-64: 4rem;
    }
    body {
      background: var(--v-color-background-primary);
      font-family: var(--v-font-sans);
      color: var(--v-color-foreground-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: var(--v-space-64);
      padding: var(--v-space-64) var(--v-space-24);
    }
    .header {
      text-align: center;
    }
    .header__logo {
      font-family: var(--v-font-broad);
      font-size: 12px;
      letter-spacing: 0.4em;
      color: var(--v-color-foreground-tertiary);
      text-transform: uppercase;
      margin-bottom: var(--v-space-16);
    }
    .header__title {
      font-size: clamp(2.5rem, 3vw + 1rem, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: var(--v-space-8);
    }
    .header__subtitle {
      font-size: 16px;
      color: var(--v-color-foreground-secondary);
      font-weight: 400;
    }
    .header__subtitle code {
      color: var(--v-color-foreground-tertiary);
      font-size: 14px;
    }
    .cards {
      display: flex;
      gap: var(--v-space-16);
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      width: 320px;
      height: 220px;
      background: var(--v-color-background-secondary);
      border: 1px solid var(--v-color-ornament-primary);
      border-radius: var(--v-shape-default);
      text-decoration: none;
      color: var(--v-color-foreground-primary);
      padding: var(--v-space-24);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s ease;
    }
    a.card:hover {
      transform: scale(1.03);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      z-index: 2;
    }
    .card__icon { font-size: 36px; margin-bottom: auto; }
    .card__label {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: var(--v-space-4);
    }
    .card__desc {
      font-size: 14px;
      color: var(--v-color-foreground-secondary);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <p class="header__logo">V O L V O</p>
    <h1 class="header__title">Software Bentos</h1>
    <p class="header__subtitle">Quarterly OTA release highlights — powered by <code>bento-data.json</code></p>
  </div>
  <div class="cards">
    <a href="bento-slide.html" class="card">
      <span class="card__icon">🖥️</span>
      <span class="card__label">Slide View</span>
      <span class="card__desc">Fixed 1920×1080 for presentations on monitors</span>
    </a>
    <a href="bento-web.html" class="card">
      <span class="card__icon">🌐</span>
      <span class="card__label">Web View</span>
      <span class="card__desc">Responsive and interactive for browsing & sharing</span>
    </a>
  </div>
</body>
</html>
