<!DOCTYPE html>
<html lang="en" data-color-mode="dark">
<head>
  <meta charset="UTF-8">
  <title>OTA Bento – View Selector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --v-color-foreground-primary: #ffffff;
      --v-color-foreground-secondary: #969696;
      --v-color-foreground-tertiary: #787878;
      --v-color-background-primary: #000000;
      --v-color-background-secondary: #171717;
      --v-color-ornament-primary: rgb(100% 100% 100% / 0.16);
      --v-color-state-primary-subtle: rgb(100% 100% 100% / 0.08);
      --v-font-sans: "Volvo Centum", "Helvetica Neue", "Helvetica", "Noto Sans", "Segoe UI", "Arial", sans-serif;
      --v-font-broad: "Volvo Broad Pro", "Volvo Broad", "Arial Black", sans-serif;
      --v-shape-default: 0px;
      --v-space-8: 0.5rem;
      --v-space-16: 1rem;
      --v-space-48: 3rem;
    }
    body {
      background: var(--v-color-background-primary);
      font-family: var(--v-font-sans);
      color: var(--v-color-foreground-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: var(--v-space-48);
    }
    h1 { font-size: 2rem; font-weight: 400; letter-spacing: -0.02em; }
    p { color: var(--v-color-foreground-secondary); font-size: 14px; margin-top: var(--v-space-8); }
    code { color: var(--v-color-foreground-tertiary); }
    .cards { display: flex; gap: var(--v-space-16); }
    a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 280px;
      height: 180px;
      background: var(--v-color-background-secondary);
      border: 1px solid var(--v-color-ornament-primary);
      border-radius: var(--v-shape-default);
      text-decoration: none;
      color: var(--v-color-foreground-primary);
      transition: background 0.2s;
    }
    a:hover { background: var(--v-color-state-primary-subtle); }
    .card__icon { font-size: 40px; margin-bottom: 12px; }
    .card__label { font-size: 16px; font-weight: 400; }
    .card__desc { font-size: 12px; color: var(--v-color-foreground-tertiary); margin-top: 4px; }
    .logo { font-family: var(--v-font-broad); font-size: 12px; letter-spacing: 0.4em; color: var(--v-color-foreground-tertiary); text-transform: uppercase; margin-bottom: var(--v-space-16); }
  </style>
</head>
<body>
  <div style="text-align:center;">
    <p class="logo">V O L V O</p>
    <h1>Software Bentos</h1>
    <p>Both views are driven by the same <code>bento-data.json</code></p>
  </div>
  <div class="cards">
    <a href="bento-slide.html">
      <span class="card__icon">🖥️</span>
      <span class="card__label">Slide View</span>
      <span class="card__desc">Fixed 1920×1080 for presentations</span>
    </a>
    <a href="bento-web.html">
      <span class="card__icon">🌐</span>
      <span class="card__label">Web View</span>
      <span class="card__desc">Responsive, scrollable, interactive</span>
    </a>
  </div>
</body>
</html>
