<!DOCTYPE html>
<html lang="en" data-color-mode="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTA Bento – Responsive Web View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Volvo Design System Tokens (Centenary dark mode) */
      --v-color-foreground-primary: #ffffff;
      --v-color-foreground-secondary: #969696;
      --v-color-foreground-tertiary: #787878;
      --v-color-foreground-inverted: #000000;
      --v-color-background-primary: #000000;
      --v-color-background-secondary: #171717;
      --v-color-ornament-primary: rgb(100% 100% 100% / 0.16);
      --v-color-surface-accent-blue: #3354ff;
      --v-color-surface-accent-safety: #fc6408;
      --v-color-surface-feedback-green: #048220;
      --v-color-surface-feedback-red: #e52715;
      --v-color-state-primary-subtle: rgb(100% 100% 100% / 0.08);
      --v-color-state-primary-medium: rgb(100% 100% 100% / 0.16);

      /* Spacing */
      --v-space-2: 0.125rem;
      --v-space-4: 0.25rem;
      --v-space-8: 0.5rem;
      --v-space-12: 0.75rem;
      --v-space-16: 1rem;
      --v-space-24: 1.5rem;
      --v-space-32: 2rem;
      --v-space-48: 3rem;
      --v-space-64: 4rem;

      /* Shape */
      --v-shape-default: 0px;
      --v-shape-emphasis: 9999px;

      /* Font */
      --v-font-sans: "Volvo Centum", "Helvetica Neue", "Helvetica", "Noto Sans", "Segoe UI", "Arial", sans-serif;
      --v-font-broad: "Volvo Broad Pro", "Volvo Broad", "Arial Black", sans-serif;
    }

    body {
      background: var(--v-color-background-primary);
      font-family: var(--v-font-sans);
      color: var(--v-color-foreground-primary);
      min-height: 100vh;
    }

    /* === HEADER === */
    .header {
      padding: var(--v-space-64) var(--v-space-48) var(--v-space-48);
      max-width: 1400px;
      margin: 0 auto;
    }

    .header__logo {
      font-family: var(--v-font-broad);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--v-color-foreground-tertiary);
      margin-bottom: var(--v-space-24);
    }

    .header__title {
      font-size: clamp(2rem, 2.143vw + 1.357rem, 3.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: calc(1em + 0.5rem);
      margin-bottom: var(--v-space-8);
    }

    .header__subtitle {
      font-size: 16px;
      color: var(--v-color-foreground-secondary);
      font-weight: 400;
      line-height: 1.5;
    }

    /* === SECTIONS === */
    .section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 var(--v-space-48) var(--v-space-64);
    }

    .section__label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--v-color-foreground-tertiary);
      margin-bottom: var(--v-space-24);
    }

    /* === HERO GRID === */
    .grid-heroes {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      grid-template-rows: 420px;
      gap: var(--v-space-2);
    }

    /* === MEDIUM GRID === */
    .grid-medium {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--v-space-2);
    }

    /* === SMALL GRID === */
    .grid-small {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--v-space-2);
    }

    /* === TILES === */
    .tile {
      border-radius: var(--v-shape-default);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: var(--v-space-32);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s ease;
    }

    .tile:hover {
      transform: scale(1.03);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      z-index: 2;
    }

    /* Heroes */
    .tile--hero {
      min-height: 420px;
      background-size: cover;
      background-position: center;
      cursor: pointer;
    }

    .tile--hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.15) 60%, transparent 100%);
      z-index: 1;
    }

    .tile--hero .tile__content { position: relative; z-index: 2; }

    .hero-0 { background: linear-gradient(160deg, #0a0f2e 0%, #131d5c 100%); }
    .hero-1 { background: linear-gradient(160deg, #0a1f0a 0%, #153015 100%); }
    .hero-2 { background: linear-gradient(160deg, #2a0a0a 0%, #401515 100%); }

    .tile--hero:hover { transform: scale(1.02); }

    /* Medium */
    .tile--medium {
      background: var(--v-color-background-secondary);
      border: 1px solid var(--v-color-ornament-primary);
      min-height: 280px;
      cursor: pointer;
    }

    .tile--medium .tile__icon {
      font-size: 36px;
      margin-bottom: var(--v-space-16);
    }

    /* Small */
    .tile--small {
      background: var(--v-color-background-secondary);
      border: 1px solid var(--v-color-ornament-primary);
      border-radius: var(--v-shape-default);
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      padding: var(--v-space-24);
      gap: var(--v-space-16);
      cursor: default;
    }

    .tile--small .tile__icon { font-size: 22px; flex-shrink: 0; }

    /* Typography — editorial scale with Volvo DNA */
    .tile__headline {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: var(--v-space-8);
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    .tile--hero .tile__headline {
      font-size: clamp(2rem, 1.5vw + 1.5rem, 2.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: var(--v-space-8);
    }

    .hero-0 .tile__headline {
      font-size: clamp(2.5rem, 2.5vw + 1.5rem, 3.5rem);
    }

    .tile--small .tile__headline { font-size: 15px; font-weight: 600; }

    .tile__subheadline {
      font-size: 16px;
      font-weight: 400;
      color: var(--v-color-foreground-secondary);
      line-height: 1.5;
      margin-bottom: var(--v-space-16);
      text-wrap: pretty;
    }

    .tile--medium .tile__subheadline { font-size: 14px; margin-bottom: var(--v-space-16); }

    /* Tags — pill shape */
    .tile__tags { display: flex; gap: var(--v-space-8); align-items: center; flex-wrap: wrap; }

    .tag {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 12px;
      border-radius: var(--v-shape-emphasis);
      background: var(--v-color-state-primary-subtle);
      color: var(--v-color-foreground-secondary);
    }

    .tag--safety { background: var(--v-color-surface-accent-safety); color: #000; }
    .tag--platform { background: var(--v-color-surface-accent-blue); color: #fff; }
    .tag--sustainability { background: var(--v-color-surface-feedback-green); color: #fff; }
    .tag--convenience { background: var(--v-color-surface-accent-blue); color: #fff; opacity: 0.8; }
    .tag--ux { background: var(--v-color-foreground-tertiary); color: #000; }
    .tag--new { background: var(--v-color-foreground-primary); color: #000; }
    .tag--spa { background: transparent; border: 1px solid var(--v-color-ornament-primary); color: var(--v-color-foreground-tertiary); }

    .tile--accent-safety { border-left: 2px solid var(--v-color-surface-accent-safety); }
    .tile--accent-convenience { border-left: 2px solid var(--v-color-surface-accent-blue); }
    .tile--accent-other { border-left: 2px solid var(--v-color-foreground-tertiary); }

    /* Responsive */
    @media (max-width: 1100px) {
      .grid-heroes { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
      .hero-0 { grid-column: 1 / 3; }
      .grid-medium { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 700px) {
      .header { padding: var(--v-space-32) var(--v-space-24) var(--v-space-24); }
      .section { padding: 0 var(--v-space-24) var(--v-space-48); }
      .grid-heroes { grid-template-columns: 1fr; }
      .hero-0 { grid-column: 1; }
      .grid-medium { grid-template-columns: 1fr; }
      .grid-small { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<a href="index.html" style="position:fixed;top:24px;left:28px;z-index:100;color:var(--v-color-foreground-secondary);text-decoration:none;font-family:var(--v-font-sans);font-size:13px;display:flex;align-items:center;gap:6px;letter-spacing:0.02em;"><span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span>Back</a>

<header class="header" id="header"></header>
<section class="section" id="heroes-section"></section>
<section class="section" id="medium-section"></section>
<section class="section" id="small-section"></section>

<script>
fetch('bento-data.json').then(r => r.json()).then(data => {
  const heroes = data.features.filter(f => f.tier === 'hero');
  const mediums = data.features.filter(f => f.tier === 'medium');
  const smalls = data.features.filter(f => f.tier === 'small');

  // Header
  document.getElementById('header').innerHTML = `
    <div class="header__logo"><img src="https://theoceanrace.s3.amazonaws.com/original/m144223_volvo-new-logo-color.png" alt="Volvo" style="height:28px;filter:invert(1);"></div>
    <h1 class="header__title">${data.release.title}</h1>
    <p class="header__subtitle">${data.release.subtitle}</p>
  `;

  // Heroes
  let heroHtml = '<p class="section__label">Highlights</p><div class="grid-heroes">';
  heroes.forEach((f, i) => {
    heroHtml += `
      <div class="tile tile--hero hero-${i}">
        <div class="tile__content">
          <h2 class="tile__headline">${f.headline}</h2>
          <p class="tile__subheadline">${f.subheadline}</p>
          <div class="tile__tags">
            <span class="tag tag--${f.tagColor}">${f.tag}</span>
            <span class="tag tag--spa">${f.platform}</span>
          </div>
        </div>
      </div>`;
  });
  heroHtml += '</div>';
  document.getElementById('heroes-section').innerHTML = heroHtml;

  // Medium
  let medHtml = '<p class="section__label">Also in this release</p><div class="grid-medium">';
  mediums.forEach(f => {
    medHtml += `
      <div class="tile tile--medium">
        <div class="tile__content">
          <div class="tile__icon">${f.icon}</div>
          <h2 class="tile__headline">${f.headline}</h2>
          <p class="tile__subheadline">${f.subheadline}</p>
          <div class="tile__tags">
            <span class="tag tag--${f.tagColor}">${f.tag}</span>
            <span class="tag tag--spa">${f.platform}</span>
          </div>
        </div>
      </div>`;
  });
  medHtml += '</div>';
  document.getElementById('medium-section').innerHTML = medHtml;

  // Smalls
  let smallHtml = '<p class="section__label">More updates</p><div class="grid-small">';
  smalls.forEach(f => {
    smallHtml += `
      <div class="tile tile--small tile--accent-${f.accent}">
        <span class="tile__icon">${f.icon}</span>
        <span class="tile__headline">${f.headline}</span>
      </div>`;
  });
  smallHtml += '</div>';
  document.getElementById('small-section').innerHTML = smallHtml;
});
</script>
</body>
</html>
